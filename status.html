<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F2F4F6">
<title>내 현황 — 총무 서비스</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root {
  --g-green: #00C277; --g-teal: #00B5A5; --g-blue: #3182F6;
  --grad: linear-gradient(135deg, #00C778 0%, #00B5A5 45%, #3182F6 100%);
  --primary: #00A86B; --primary-light: #E6F8F0;
  --navy: #17244A; --navy-2: #21346B;
  --bg: #F2F4F6; --surface: #FFFFFF; --surface-hover: #F8FAFB;
  --text: #191F28; --text-secondary: #4E5968; --text-muted: #8B95A1;
  --border: #E5E8EB; --border-light: #F2F4F6;
  --success: #00C277; --success-bg: #E6F8F0;
  --warning: #FF8A00; --warning-bg: #FFF3E0;
  --danger: #F04452; --danger-bg: #FDEDEE;
  --info: #3182F6; --info-bg: #EAF2FE;
  --radius: 20px; --radius-sm: 14px; --radius-xs: 8px;
  --shadow-sm: 0 1px 4px rgba(25,31,40,0.04);
  --shadow: 0 2px 8px rgba(25,31,40,0.06);
  --shadow-md: 0 6px 16px rgba(25,31,40,0.08);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Pretendard Variable', Pretendard, -apple-system, 'Noto Sans KR', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; min-height: 100dvh;
  max-width: 430px; margin: 0 auto;
  -webkit-font-smoothing: antialiased;
  padding-bottom: calc(76px + env(safe-area-inset-bottom, 0px));
}

/* Large Title */
.top-bar {
  padding: calc(24px + env(safe-area-inset-top, 0px)) 24px 4px;
  background: var(--bg);
}
.top-bar h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.6px; }
.top-bar p { font-size: 13px; color: var(--text-muted); margin-top: 4px; font-weight: 500; }

/* Stats */
.stats-row {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  padding: 18px 20px 4px;
}
.stat-card {
  background: var(--surface); border-radius: var(--radius-sm);
  padding: 16px 8px 14px; text-align: center;
  border: 2px solid transparent; box-shadow: var(--shadow-sm);
  cursor: pointer; transition: all var(--transition);
  min-height: 68px;
}
.stat-card:active { transform: scale(0.95); }
.stat-card.active { border-color: var(--primary); background: var(--primary-light); }
.stat-val { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
.stat-card.active .stat-val { color: var(--primary); }
.stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-weight: 700; }
.stat-card.active .stat-label { color: var(--primary); }

/* Filter Tabs */
.filter-tabs {
  display: flex; gap: 6px; padding: 14px 20px 16px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.filter-tab {
  padding: 8px 18px; border-radius: 20px;
  font-size: 13px; font-weight: 700;
  background: var(--surface); color: var(--text-secondary);
  cursor: pointer; transition: all var(--transition);
  white-space: nowrap; flex-shrink: 0;
  box-shadow: var(--shadow-sm);
}
.filter-tab:active { transform: scale(0.95); }
.filter-tab.active { background: var(--navy); color: white; }

/* Report List */
.report-list { padding: 0 20px; }
.report-card {
  background: var(--surface); border-radius: var(--radius-sm);
  padding: 18px; box-shadow: var(--shadow-sm);
  margin-bottom: 10px;
  cursor: pointer; transition: all var(--transition);
  min-height: 56px;
}
.report-card:active { transform: scale(0.98); background: var(--surface-hover); }
.report-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.report-title { font-size: 15px; font-weight: 700; flex: 1; margin-right: 8px; letter-spacing: -0.3px; line-height: 1.4; }
.report-status {
  font-size: 11px; font-weight: 700; padding: 4px 11px;
  border-radius: 20px; flex-shrink: 0;
}
.status-접수 { background: var(--info-bg); color: var(--info); }
.status-처리중 { background: var(--warning-bg); color: var(--warning); }
.status-완료 { background: var(--success-bg); color: var(--success); }
.report-meta {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  font-size: 12px; color: var(--text-muted); font-weight: 500;
}
.report-meta-item { display: flex; align-items: center; gap: 4px; }
.report-cat-badge {
  font-size: 11px; font-weight: 700; color: var(--text-secondary);
  background: var(--bg); padding: 3px 9px; border-radius: 6px;
}
.anon-badge {
  font-size: 10px; font-weight: 700; color: var(--g-blue);
  background: var(--info-bg); padding: 3px 9px; border-radius: 6px;
}

/* Empty */
.empty-state {
  text-align: center; padding: 52px 20px; color: var(--text-muted);
  background: var(--surface); border-radius: var(--radius-sm); box-shadow: var(--shadow-sm);
}
.empty-state .icon { font-size: 42px; margin-bottom: 10px; }
.empty-state p { font-size: 14px; line-height: 1.5; font-weight: 500; }

/* Modal Overlay */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(13,18,26,0.55); backdrop-filter: blur(4px);
  z-index: 200; display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--surface); border-radius: 24px 24px 0 0;
  width: 100%; max-width: 520px; max-height: 85vh;
  padding: 16px 24px calc(28px + env(safe-area-inset-bottom, 0px)); overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.3, 1, 0.4, 1);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle {
  width: 40px; height: 4px; border-radius: 2px;
  background: var(--border); margin: 0 auto 22px;
}
.modal-title { font-size: 19px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.4px; }
.modal-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; font-weight: 500; }

/* Timeline */
.timeline { position: relative; padding-left: 26px; }
.timeline::before {
  content: ''; position: absolute; left: 7px; top: 4px; bottom: 4px;
  width: 2px; background: var(--border-light);
}
.tl-item { position: relative; padding-bottom: 22px; }
.tl-item:last-child { padding-bottom: 0; }
.tl-dot {
  position: absolute; left: -26px; top: 2px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--border); border: 3px solid var(--surface);
  z-index: 1;
}
.tl-item:first-child .tl-dot { background: var(--g-blue); box-shadow: 0 0 0 3px var(--info-bg); }
.tl-item.done .tl-dot { background: var(--success); box-shadow: 0 0 0 3px var(--success-bg); }
.tl-date { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; font-weight: 500; }
.tl-action { font-size: 14px; font-weight: 800; margin-bottom: 2px; letter-spacing: -0.2px; }
.tl-note { font-size: 13px; color: var(--text-secondary); line-height: 1.5; font-weight: 500; }

/* Detail Info */
.detail-section { margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border-light); }
.detail-row { display: flex; justify-content: space-between; padding: 9px 0; }
.detail-key { font-size: 13px; color: var(--text-muted); font-weight: 500; }
.detail-val { font-size: 13px; font-weight: 700; letter-spacing: -0.2px; }

.modal-close-btn {
  display: block; width: 100%; margin-top: 24px;
  padding: 16px; border-radius: var(--radius-sm);
  background: #E8EBEE; color: var(--text-secondary);
  border: none; font-size: 15px; font-weight: 800;
  cursor: pointer; font-family: inherit;
  transition: all var(--transition);
}
.modal-close-btn:active { transform: scale(0.98); }

/* Bottom Nav */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: rgba(255,255,255,0.92); backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border-light);
  display: flex; justify-content: space-around;
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom, 0px));
  z-index: 100;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  text-decoration: none; color: #B0B8C1;
  font-size: 10px; font-weight: 700;
  padding: 6px 16px;
  min-height: 44px; min-width: 64px;
  justify-content: center;
}
.nav-item.active { color: var(--primary); }
.nav-item svg { width: 24px; height: 24px; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-in { animation: fadeInUp 0.3s cubic-bezier(0.2, 0.8, 0.3, 1) both; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>내 신고 현황</h1>
  <p>접수된 신고의 처리 상태를 확인하세요</p>
</div>

<div id="stats"></div>
<div id="filters"></div>
<div id="list"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-8 9 8"/><path d="M5 10v10a1 1 0 001 1h12a1 1 0 001-1V10"/></svg>
    <span>홈</span>
  </a>
  <a class="nav-item" href="report.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
    <span>신고</span>
  </a>
  <a class="nav-item active" href="status.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>
    <span>내 현황</span>
  </a>
  <a class="nav-item" href="admin.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10M6 20V4M18 20v-6"/></svg>
    <span>관리</span>
  </a>
</nav>

<script type="module">
import { listReports, getReport } from './lib/supabase.js';

let filter = '전체';
let cachedReports = [];

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function formatDate(d) {
  const diff = Math.floor((new Date() - new Date(d)) / 86400000);
  if (diff === 0) return '오늘';
  if (diff === 1) return '어제';
  if (diff < 7) return `${diff}일 전`;
  return d;
}

async function render() {
  let reports;
  try {
    reports = await listReports();
    cachedReports = reports;
  } catch (err) {
    document.getElementById('list').innerHTML = `<div style="padding:0 20px"><div class="empty-state"><div class="icon">⚠️</div><p>데이터 로드 실패<br><small>${escapeHtml(err.message)}</small></p></div></div>`;
    return;
  }
  const counts = { '전체': reports.length, '접수': 0, '처리중': 0, '완료': 0 };
  reports.forEach(r => { if (counts[r.status] !== undefined) counts[r.status]++; });

  document.getElementById('stats').innerHTML = `
    <div class="stats-row">
      ${['전체','접수','처리중','완료'].map(s => `
        <div class="stat-card ${filter === s ? 'active' : ''}" data-filter="${s}">
          <div class="stat-val">${counts[s]}</div>
          <div class="stat-label">${s}</div>
        </div>
      `).join('')}
    </div>`;
  document.querySelectorAll('[data-filter]').forEach(el => {
    el.addEventListener('click', () => { filter = el.dataset.filter; render(); });
  });

  const filtered = filter === '전체' ? reports : reports.filter(r => r.status === filter);

  document.getElementById('list').innerHTML = `
    <div class="report-list" style="padding-top:14px;">
      ${filtered.length > 0 ? filtered.map((r, i) => `
        <div class="report-card animate-in" style="animation-delay:${i * 0.04}s" data-report-id="${escapeHtml(r.id)}">
          <div class="report-top">
            <div class="report-title">${escapeHtml(r.title)}</div>
            <span class="report-status status-${r.status}">${escapeHtml(r.status)}</span>
          </div>
          <div class="report-meta">
            <span class="report-cat-badge">${escapeHtml(r.category)}</span>
            <span class="report-meta-item">📍 ${escapeHtml(r.location)}</span>
            <span class="report-meta-item">${escapeHtml(formatDate(r.date))}</span>
            ${r.anonymous ? '<span class="anon-badge">익명</span>' : ''}
          </div>
        </div>
      `).join('') : `
        <div class="empty-state">
          <div class="icon">📭</div>
          <p>"${escapeHtml(filter)}" 상태의 신고가 없습니다</p>
        </div>
      `}
    </div>`;
  document.querySelectorAll('[data-report-id]').forEach(el => {
    el.addEventListener('click', () => openDetail(el.dataset.reportId));
  });

  // Check hash for auto-open
  const hash = location.hash.replace('#', '');
  if (hash) {
    const report = reports.find(r => r.id === hash);
    if (report) { location.hash = ''; openDetail(report.id); }
  }
}

async function openDetail(id) {
  const report = cachedReports.find(r => r.id === id) || await getReport(id);
  if (!report) return;

  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <div class="modal-handle"></div>
    <div class="modal-title">${escapeHtml(report.title)}</div>
    <div class="modal-subtitle">${escapeHtml(report.id)} · ${escapeHtml(report.date)}</div>

    <div class="timeline">
      ${(report.timeline || []).reverse().map((t, i) => `
        <div class="tl-item ${t.action === '완료' ? 'done' : ''}">
          <div class="tl-dot"></div>
          <div class="tl-date">${escapeHtml(t.date)}</div>
          <div class="tl-action">${escapeHtml(t.action)}</div>
          <div class="tl-note">${escapeHtml(t.note)}</div>
        </div>
      `).join('')}
    </div>

    <div class="detail-section">
      <div class="detail-row"><span class="detail-key">카테고리</span><span class="detail-val">${escapeHtml(report.category)}</span></div>
      <div class="detail-row"><span class="detail-key">위치</span><span class="detail-val">${escapeHtml(report.location)}</span></div>
      <div class="detail-row"><span class="detail-key">상태</span><span class="detail-val"><span class="report-status status-${report.status}">${escapeHtml(report.status)}</span></span></div>
      <div class="detail-row"><span class="detail-key">익명</span><span class="detail-val">${report.anonymous ? '예' : '아니오'}</span></div>
      ${report.description ? `<div class="detail-row"><span class="detail-key">설명</span><span class="detail-val" style="max-width:65%;text-align:right">${escapeHtml(report.description)}</span></div>` : ''}
    </div>

    <button class="modal-close-btn" onclick="closeModal()">닫기</button>
  `;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
window.closeModal = closeModal; // inline onclick 호환

render();
</script>
</body>
</html>
