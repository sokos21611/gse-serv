<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#00C277">
<title>총무 서비스</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root {
  /* GS Energy palette */
  --g-green: #00C277; --g-teal: #00B5A5; --g-blue: #3182F6;
  --grad: linear-gradient(135deg, #00C778 0%, #00B5A5 45%, #3182F6 100%);
  --primary: #00A86B; --primary-light: #E6F8F0;
  --navy: #17244A; --navy-2: #21346B;
  /* Toss-style neutrals */
  --bg: #F2F4F6; --surface: #FFFFFF; --surface-hover: #F8FAFB;
  --text: #191F28; --text-secondary: #4E5968; --text-muted: #8B95A1;
  --border: #E5E8EB; --border-light: #F2F4F6;
  --success: #00C277; --success-bg: #E6F8F0;
  --warning: #FF8A00; --warning-bg: #FFF3E0;
  --danger: #F04452; --danger-bg: #FDEDEE;
  --info: #3182F6; --info-bg: #EAF2FE;
  --radius: 20px; --radius-sm: 14px; --radius-xs: 8px;
  --shadow-sm: 0 1px 4px rgba(25,31,40,0.04);
  --shadow: 0 2px 8px rgba(25,31,40,0.06);
  --shadow-md: 0 6px 16px rgba(25,31,40,0.08);
  --shadow-lg: 0 12px 28px rgba(25,31,40,0.12);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html { background: #E9EDF1; }
body {
  font-family: 'Pretendard Variable', Pretendard, -apple-system, 'Noto Sans KR', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; min-height: 100dvh;
  max-width: 430px; margin: 0 auto;
  -webkit-font-smoothing: antialiased;
  padding-bottom: calc(76px + env(safe-area-inset-bottom, 0px));
}

/* Header — GS gradient hero */
.header {
  background: var(--grad);
  color: white;
  padding: calc(24px + env(safe-area-inset-top, 0px)) 24px 44px;
  position: relative; overflow: hidden;
}
.header::before {
  content: ''; position: absolute; top: -60px; right: -50px;
  width: 180px; height: 180px; border-radius: 50%;
  background: rgba(255,255,255,0.10); filter: blur(2px);
}
.header::after {
  content: ''; position: absolute; bottom: -30px; left: 18%;
  width: 110px; height: 110px; border-radius: 50%;
  background: rgba(255,255,255,0.07);
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; position: relative; z-index: 1; }
.header-logo { font-size: 15px; font-weight: 800; letter-spacing: -0.3px; display: flex; align-items: center; gap: 7px; }
.header-logo .logo-mark {
  width: 22px; height: 22px; border-radius: 7px;
  background: rgba(255,255,255,0.92);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 900; color: var(--primary);
}
.header-badge {
  font-size: 10px; font-weight: 700; padding: 4px 11px; letter-spacing: 0.2px;
  background: rgba(255,255,255,0.18); border-radius: 20px;
  backdrop-filter: blur(4px);
}
.header-greeting { position: relative; z-index: 1; }
.header-greeting h2 { font-size: 25px; font-weight: 800; letter-spacing: -0.6px; margin-bottom: 6px; }
.header-greeting p { font-size: 14px; color: rgba(255,255,255,0.85); font-weight: 500; }
.header-stats { display: flex; gap: 8px; margin-top: 18px; position: relative; z-index: 1; }
.header-stat {
  flex: 1; background: rgba(13,34,66,0.28); border-radius: var(--radius-sm);
  padding: 10px 12px; backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.14);
}
.header-stat .num { font-size: 19px; font-weight: 800; letter-spacing: -0.5px; }
.header-stat .cap { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.75); margin-top: 1px; }

/* Quick Actions — floating cards */
.quick-actions {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  padding: 0 20px; margin-top: -24px; position: relative; z-index: 2;
}
.quick-btn {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface); border-radius: var(--radius);
  padding: 18px 16px; box-shadow: var(--shadow-md);
  text-decoration: none; color: var(--text);
  transition: all var(--transition); cursor: pointer;
  min-height: 68px;
}
.quick-btn:active { transform: scale(0.97); }
.quick-btn .icon {
  width: 44px; height: 44px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 21px; flex-shrink: 0;
}
.quick-btn .icon.report-icon { background: linear-gradient(135deg, #FFE8E8, #FFD9DE); }
.quick-btn .icon.status-icon { background: linear-gradient(135deg, #E0F4FF, #D8E9FF); }
.quick-btn .label { font-size: 14px; font-weight: 800; letter-spacing: -0.2px; }
.quick-btn .sublabel { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-weight: 500; }

/* Favorite (자주 쓰는 신고) */
.fav-row {
  display: flex; gap: 10px; padding: 0 20px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.fav-row::-webkit-scrollbar { display: none; }
.fav-card {
  flex-shrink: 0; width: 150px;
  background: var(--surface); border-radius: var(--radius-sm);
  padding: 14px; box-shadow: var(--shadow-sm);
  text-decoration: none; color: var(--text);
  transition: all var(--transition); cursor: pointer;
  position: relative;
}
.fav-card:active { transform: scale(0.96); background: var(--primary-light); }
.fav-emoji { font-size: 26px; margin-bottom: 8px; }
.fav-name { font-size: 13px; font-weight: 800; letter-spacing: -0.2px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fav-loc { font-size: 11px; color: var(--text-muted); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fav-count {
  position: absolute; top: 12px; right: 12px;
  font-size: 9px; font-weight: 800; color: var(--primary);
  background: var(--primary-light); padding: 2px 7px; border-radius: 10px;
}
.fav-go { font-size: 11px; font-weight: 700; color: var(--primary); margin-top: 8px; }

/* Section */
.section { padding: 28px 20px 0; }
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; padding: 0 4px;
}
.section-title { font-size: 17px; font-weight: 800; letter-spacing: -0.4px; }
.section-link {
  font-size: 13px; color: var(--text-muted); font-weight: 600;
  text-decoration: none;
}

/* Recent Reports */
.report-card {
  background: var(--surface); border-radius: var(--radius-sm);
  padding: 16px; box-shadow: var(--shadow-sm);
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 14px;
  text-decoration: none; color: inherit;
  transition: all var(--transition); cursor: pointer;
  min-height: 56px;
}
.report-card:active { transform: scale(0.98); background: var(--surface-hover); }
.report-icon-wrap {
  width: 46px; height: 46px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 21px; flex-shrink: 0;
  background: var(--bg);
}
.report-info { flex: 1; min-width: 0; }
.report-title { font-size: 14px; font-weight: 700; letter-spacing: -0.2px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.report-meta { font-size: 12px; color: var(--text-muted); font-weight: 500; }
.report-status {
  font-size: 11px; font-weight: 700; padding: 4px 10px;
  border-radius: 20px; flex-shrink: 0; white-space: nowrap;
}
.status-접수 { background: var(--info-bg); color: var(--info); }
.status-처리중 { background: var(--warning-bg); color: var(--warning); }
.status-완료 { background: var(--success-bg); color: var(--success); }

/* Category Grid */
.cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.cat-card {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  background: var(--surface); border-radius: var(--radius-sm);
  padding: 20px 8px; box-shadow: var(--shadow-sm);
  text-decoration: none; color: var(--text);
  transition: all var(--transition); cursor: pointer;
  min-height: 92px;
}
.cat-card:active { transform: scale(0.95); background: var(--primary-light); }
.cat-emoji { font-size: 30px; }
.cat-name { font-size: 13px; font-weight: 700; letter-spacing: -0.2px; }

/* Asset Recognized View */
.asset-view { padding: 20px; }
.asset-back {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 14px; color: var(--text-secondary); font-weight: 600;
  text-decoration: none; margin-bottom: 16px; padding: 6px 4px;
}
.asset-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 28px 24px; box-shadow: var(--shadow);
  text-align: center;
}
.asset-emoji { font-size: 52px; margin-bottom: 12px; }
.asset-name { font-size: 19px; font-weight: 800; letter-spacing: -0.4px; margin-bottom: 4px; }
.asset-detail { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; font-weight: 500; }
.asset-id { font-size: 11px; color: var(--text-muted); font-family: 'SF Mono', Consolas, monospace; background: var(--bg); display: inline-block; padding: 3px 10px; border-radius: 6px; margin-top: 10px; }
.asset-stats {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
  margin-top: 22px;
}
.asset-stat {
  background: var(--bg); border-radius: var(--radius-xs); padding: 14px 8px; text-align: center;
}
.asset-stat .val { font-size: 18px; font-weight: 800; color: var(--primary); letter-spacing: -0.4px; }
.asset-stat .lbl { font-size: 10px; color: var(--text-muted); margin-top: 3px; font-weight: 600; }
.asset-report-btn {
  display: block; width: 100%; margin-top: 16px;
  padding: 18px; border-radius: var(--radius-sm);
  background: var(--grad);
  color: white; border: none; font-size: 16px; font-weight: 800;
  cursor: pointer; font-family: inherit; letter-spacing: -0.2px;
  transition: all var(--transition); text-decoration: none; text-align: center;
  box-shadow: 0 6px 16px rgba(0,168,107,0.25);
}
.asset-report-btn:active { transform: scale(0.98); filter: brightness(1.05); }

/* Empty State */
.empty-state {
  text-align: center; padding: 40px 20px;
  color: var(--text-muted);
  background: var(--surface); border-radius: var(--radius-sm);
  box-shadow: var(--shadow-sm);
}
.empty-state .icon { font-size: 38px; margin-bottom: 10px; }
.empty-state p { font-size: 14px; line-height: 1.5; font-weight: 500; }

/* Bottom Nav */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: rgba(255,255,255,0.92); backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border-light);
  display: flex; justify-content: space-around;
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom, 0px));
  z-index: 100;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  text-decoration: none; color: #B0B8C1;
  font-size: 10px; font-weight: 700;
  padding: 6px 16px;
  min-height: 44px; min-width: 64px;
  justify-content: center;
  transition: color var(--transition);
}
.nav-item.active { color: var(--primary); }
.nav-item svg { width: 24px; height: 24px; }

/* Animations */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-in { animation: fadeInUp 0.35s cubic-bezier(0.2, 0.8, 0.3, 1) both; }
.animate-in:nth-child(1) { animation-delay: 0s; }
.animate-in:nth-child(2) { animation-delay: 0.05s; }
.animate-in:nth-child(3) { animation-delay: 0.1s; }
.animate-in:nth-child(4) { animation-delay: 0.15s; }
.animate-in:nth-child(5) { animation-delay: 0.2s; }
.animate-in:nth-child(6) { animation-delay: 0.25s; }
</style>
</head>
<body>

<div id="app"></div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a class="nav-item active" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-8 9 8"/><path d="M5 10v10a1 1 0 001 1h12a1 1 0 001-1V10"/></svg>
    <span>홈</span>
  </a>
  <a class="nav-item" href="report.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
    <span>신고</span>
  </a>
  <a class="nav-item" href="status.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>
    <span>내 현황</span>
  </a>
  <a class="nav-item" href="admin.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10M6 20V4M18 20v-6"/></svg>
    <span>관리</span>
  </a>
</nav>

<script type="module">
import { listReports, listAssets, getAsset } from './lib/supabase.js';

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ── Routing ──
const params = new URLSearchParams(location.search);
const qrType = params.get('type');
const qrId = params.get('id');

const app = document.getElementById('app');

if (qrType && qrId) {
  renderAssetView(qrType, qrId).catch(showError);
} else {
  renderHome().catch(showError);
}

function showError(err) {
  console.error(err);
  app.innerHTML = `<div style="padding:20px"><div class="empty-state"><div class="icon">⚠️</div><p>데이터 로드 실패<br><small>${escapeHtml(err.message)}</small></p></div></div>`;
}

// ── 기기 단위 개인화 (localStorage는 선호 정보만 — 데이터는 Supabase) ──
function getFavorites() {
  try {
    return JSON.parse(localStorage.getItem('gs_fav_reports') || '[]')
      .sort((a, b) => b.count - a.count || b.last - a.last)
      .slice(0, 5);
  } catch { return []; }
}
function getMyReportIds() {
  try { return JSON.parse(localStorage.getItem('gs_my_report_ids') || '[]'); } catch { return []; }
}

// ── Home View ──
async function renderHome() {
  const reports = await listReports();
  const recent = reports.slice(0, 3);
  const statusCounts = { '접수': 0, '처리중': 0, '완료': 0 };
  reports.forEach(r => { if (statusCounts[r.status] !== undefined) statusCounts[r.status]++; });
  const favs = getFavorites();
  const myCount = getMyReportIds().filter(id => reports.some(r => r.id === id)).length;

  app.innerHTML = `
    <div class="header">
      <div class="header-top">
        <div class="header-logo"><span class="logo-mark">GS</span>총무 서비스</div>
        <div class="header-badge">v2.0</div>
      </div>
      <div class="header-greeting">
        <h2>안녕하세요 👋</h2>
        <p>불편한 점이 있으면 바로 신고해 주세요</p>
      </div>
      <div class="header-stats">
        <div class="header-stat"><div class="num">${statusCounts['접수']}</div><div class="cap">접수</div></div>
        <div class="header-stat"><div class="num">${statusCounts['처리중']}</div><div class="cap">처리중</div></div>
        <div class="header-stat"><div class="num">${statusCounts['완료']}</div><div class="cap">완료</div></div>
      </div>
    </div>

    <div class="quick-actions">
      <a class="quick-btn animate-in" href="report.html">
        <div class="icon report-icon">🚨</div>
        <div>
          <div class="label">빠른 신고</div>
          <div class="sublabel">불편사항 바로 접수</div>
        </div>
      </a>
      <a class="quick-btn animate-in" href="status.html">
        <div class="icon status-icon">📋</div>
        <div>
          <div class="label">내 현황</div>
          <div class="sublabel">${myCount > 0 ? `내 신고 ${myCount}건` : '처리 상태 확인'}</div>
        </div>
      </a>
    </div>

    ${favs.length > 0 ? `
    <div class="section" style="padding-left:0;padding-right:0;">
      <div class="section-header" style="padding:0 24px;">
        <div class="section-title">⭐ 자주 쓰는 신고</div>
      </div>
      <div class="fav-row">
        ${favs.map((f, i) => `
          <a class="fav-card animate-in" style="animation-delay:${i * 0.05}s"
             href="report.html?category=${encodeURIComponent(f.cat)}&sub=${encodeURIComponent(f.sub)}&loc=${encodeURIComponent(f.loc)}">
            <div class="fav-count">${f.count}회</div>
            <div class="fav-emoji">${escapeHtml(f.emoji)}</div>
            <div class="fav-name">${escapeHtml(f.sub)}</div>
            <div class="fav-loc">${escapeHtml(f.loc)}</div>
            <div class="fav-go">바로 신고 →</div>
          </a>
        `).join('')}
      </div>
    </div>
    ` : ''}

    <div class="section">
      <div class="section-header">
        <div class="section-title">최근 신고</div>
        <a class="section-link" href="status.html">전체보기</a>
      </div>
      ${recent.length > 0 ? recent.map((r, i) => `
        <a class="report-card animate-in" href="status.html#${encodeURIComponent(r.id)}" style="animation-delay:${i * 0.05}s">
          <div class="report-icon-wrap">${getCategoryEmoji(r.category)}</div>
          <div class="report-info">
            <div class="report-title">${escapeHtml(r.title)}</div>
            <div class="report-meta">${escapeHtml(r.location)} · ${escapeHtml(formatDate(r.date))}</div>
          </div>
          <span class="report-status status-${r.status}">${escapeHtml(r.status)}</span>
        </a>
      `).join('') : `
        <div class="empty-state">
          <div class="icon">📭</div>
          <p>아직 신고 내역이 없습니다</p>
        </div>
      `}
    </div>

    <div class="section" style="padding-bottom: 28px;">
      <div class="section-header">
        <div class="section-title">카테고리별 신고</div>
      </div>
      <div class="cat-grid">
        <a class="cat-card animate-in" href="report.html?category=facility">
          <div class="cat-emoji">🏗️</div><div class="cat-name">시설</div>
        </a>
        <a class="cat-card animate-in" href="report.html?category=environment">
          <div class="cat-emoji">🌡️</div><div class="cat-name">환경</div>
        </a>
        <a class="cat-card animate-in" href="report.html?category=it">
          <div class="cat-emoji">💻</div><div class="cat-name">IT장비</div>
        </a>
        <a class="cat-card animate-in" href="report.html?category=cleaning">
          <div class="cat-emoji">🧹</div><div class="cat-name">청소</div>
        </a>
        <a class="cat-card animate-in" href="report.html?category=parking">
          <div class="cat-emoji">🚗</div><div class="cat-name">주차</div>
        </a>
        <a class="cat-card animate-in" href="report.html?category=other">
          <div class="cat-emoji">📝</div><div class="cat-name">기타</div>
        </a>
      </div>
    </div>
  `;
}

// ── Asset View ──
async function renderAssetView(type, id) {
  let asset = await getAsset(id);
  if (!asset) {
    const assets = await listAssets();
    asset = assets.find(a => a.type === type);
  }

  if (!asset) {
    app.innerHTML = `
      <div class="asset-view">
        <a class="asset-back" href="index.html">← 홈으로</a>
        <div class="empty-state">
          <div class="icon">❓</div>
          <p>자산 정보를 찾을 수 없습니다<br><small style="color:var(--text-muted)">${escapeHtml(type)} / ${escapeHtml(id)}</small></p>
        </div>
      </div>`;
    return;
  }

  const allReports = await listReports();
  const reports = allReports.filter(r => r.asset_id === asset.id);

  app.innerHTML = `
    <div class="asset-view">
      <a class="asset-back" href="index.html">← 홈으로</a>
      <div class="asset-card animate-in">
        <div class="asset-emoji">${escapeHtml(asset.emoji)}</div>
        <div class="asset-name">${escapeHtml(asset.name)}</div>
        ${asset.model ? `<div class="asset-detail">${escapeHtml(asset.model)}</div>` : ''}
        ${asset.location ? `<div class="asset-detail">${escapeHtml(asset.location)}</div>` : ''}
        <div class="asset-id">${escapeHtml(asset.type)}:${escapeHtml(asset.id)}</div>
        <div class="asset-stats">
          <div class="asset-stat">
            <div class="val">${asset.reports}</div>
            <div class="lbl">누적 신고</div>
          </div>
          <div class="asset-stat">
            <div class="val">${escapeHtml(asset.installed || '-')}</div>
            <div class="lbl">설치일</div>
          </div>
          <div class="asset-stat">
            <div class="val">${reports.filter(r=>r.status!=='완료').length}</div>
            <div class="lbl">미처리</div>
          </div>
        </div>
      </div>
      <a class="asset-report-btn animate-in" href="report.html?type=${encodeURIComponent(asset.type)}&id=${encodeURIComponent(asset.id)}" style="animation-delay:0.1s">
        🚨 이 자산 신고하기
      </a>

      ${reports.length > 0 ? `
        <div class="section" style="padding:24px 0 0;">
          <div class="section-title" style="margin-bottom:12px;">이 자산의 신고 이력</div>
          ${reports.map((r, i) => `
            <a class="report-card animate-in" href="status.html#${encodeURIComponent(r.id)}" style="animation-delay:${(i+2)*0.05}s">
              <div class="report-icon-wrap">${getCategoryEmoji(r.category)}</div>
              <div class="report-info">
                <div class="report-title">${escapeHtml(r.title)}</div>
                <div class="report-meta">${escapeHtml(formatDate(r.date))}</div>
              </div>
              <span class="report-status status-${r.status}">${escapeHtml(r.status)}</span>
            </a>
          `).join('')}
        </div>
      ` : ''}
    </div>
  `;
}

// ── Helpers ──
function getCategoryEmoji(cat) {
  const map = { '시설':'🏗️', '환경':'🌡️', 'IT장비':'💻', '청소':'🧹', '주차':'🚗', '기타':'📝' };
  return map[cat] || '📋';
}
function formatDate(d) {
  const diff = Math.floor((new Date() - new Date(d)) / 86400000);
  if (diff === 0) return '오늘';
  if (diff === 1) return '어제';
  if (diff < 7) return `${diff}일 전`;
  return d;
}

// 다른 탭/앱에 갔다 돌아오면 최신 데이터로 갱신
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && !(qrType && qrId)) renderHome().catch(showError);
});
</script>
