<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#17244A">
<title>관리자 — 총무 서비스</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root {
  --g-green: #00C277; --g-teal: #00B5A5; --g-blue: #3182F6;
  --grad: linear-gradient(135deg, #00C778 0%, #00B5A5 45%, #3182F6 100%);
  --primary: #00A86B; --primary-light: #E6F8F0;
  --navy: #17244A; --navy-2: #21346B;
  --bg: #F2F4F6; --surface: #FFFFFF; --surface-hover: #F8FAFB;
  --text: #191F28; --text-secondary: #4E5968; --text-muted: #8B95A1;
  --border: #E5E8EB; --border-light: #F2F4F6;
  --success: #00C277; --success-bg: #E6F8F0;
  --warning: #FF8A00; --warning-bg: #FFF3E0;
  --danger: #F04452; --danger-bg: #FDEDEE;
  --info: #3182F6; --info-bg: #EAF2FE;
  --radius: 20px; --radius-sm: 14px; --radius-xs: 8px;
  --shadow-sm: 0 1px 4px rgba(25,31,40,0.04);
  --shadow: 0 2px 8px rgba(25,31,40,0.06);
  --shadow-md: 0 6px 16px rgba(25,31,40,0.08);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html { background: var(--navy); }
body {
  font-family: 'Pretendard Variable', Pretendard, -apple-system, 'Noto Sans KR', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; min-height: 100dvh;
  max-width: 430px; margin: 0 auto;
  -webkit-font-smoothing: antialiased;
  padding-bottom: calc(76px + env(safe-area-inset-bottom, 0px));
}

/* Top Bar — admin navy */
.top-bar {
  display: flex; align-items: center; gap: 12px;
  padding: calc(16px + env(safe-area-inset-top, 0px)) 22px 16px;
  background: var(--navy); color: white;
  position: sticky; top: 0; z-index: 50;
}
.top-bar h1 { font-size: 18px; font-weight: 800; flex: 1; letter-spacing: -0.3px; }
.admin-badge {
  font-size: 10px; font-weight: 800; padding: 4px 12px; letter-spacing: 0.5px;
  background: rgba(0,194,119,0.18); color: #3CE3A0;
  border: 1px solid rgba(0,194,119,0.35);
  border-radius: 20px;
}

/* Tabs */
.tabs {
  display: flex; background: var(--navy);
  padding: 0 12px;
  position: sticky; top: 58px; z-index: 49;
}
.tab {
  flex: 1; padding: 12px 8px 14px; text-align: center;
  font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.45);
  cursor: pointer; position: relative;
  transition: color var(--transition);
  min-height: 48px; letter-spacing: -0.2px;
}
.tab.active { color: white; }
.tab.active::after {
  content: ''; position: absolute; bottom: 0; left: 22%; right: 22%;
  height: 3px; background: var(--grad); border-radius: 3px 3px 0 0;
}

/* Dashboard Stats — navy cards (GS dashboard style) */
.dash-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  padding: 18px 20px;
}
.dash-stat {
  background: var(--navy); border-radius: var(--radius-sm);
  padding: 16px 12px 14px; text-align: center;
  box-shadow: 0 6px 14px rgba(23,36,74,0.18);
  position: relative; overflow: hidden;
}
.dash-stat::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
}
.dash-stat.pending::before { background: #5EA8FF; }
.dash-stat.progress::before { background: #FFB661; }
.dash-stat.done::before { background: #3CE3A0; }
.dash-stat .val { font-size: 26px; font-weight: 800; color: white; letter-spacing: -0.5px; }
.dash-stat.pending .val { color: #5EA8FF; }
.dash-stat.progress .val { color: #FFB661; }
.dash-stat.done .val { color: #3CE3A0; }
.dash-stat .lbl { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 3px; font-weight: 700; }

/* Report Rows */
.admin-list { padding: 0 20px 20px; }
.admin-card {
  background: var(--surface); border-radius: var(--radius-sm);
  padding: 16px 18px;
  box-shadow: var(--shadow-sm); margin-bottom: 10px;
}
.admin-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
.admin-title { font-size: 14px; font-weight: 700; flex: 1; margin-right: 8px; letter-spacing: -0.2px; line-height: 1.4; }
.admin-id { font-size: 11px; color: var(--text-muted); font-family: 'SF Mono', Consolas, monospace; background: var(--bg); padding: 2px 7px; border-radius: 5px; }
.admin-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 12px; color: var(--text-muted); margin-bottom: 12px; font-weight: 500; }
.status-select {
  padding: 8px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 700;
  border: 1.5px solid var(--border);
  background: var(--surface); color: var(--text);
  font-family: inherit; cursor: pointer;
  transition: all var(--transition);
}
.status-select:focus { outline: none; border-color: var(--primary); }

/* Asset Tab */
.asset-list { padding: 0 20px 20px; }
.asset-card {
  display: flex; align-items: center; gap: 14px;
  background: var(--surface); border-radius: var(--radius-sm);
  padding: 15px 17px;
  box-shadow: var(--shadow-sm); margin-bottom: 9px;
}
.asset-emoji { font-size: 28px; }
.asset-info { flex: 1; min-width: 0; }
.asset-name { font-size: 14px; font-weight: 700; margin-bottom: 3px; letter-spacing: -0.2px; }
.asset-detail { font-size: 11px; color: var(--text-muted); font-weight: 500; }
.asset-status-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.dot-good { background: var(--success); box-shadow: 0 0 0 3px var(--success-bg); }
.dot-warn { background: var(--warning); box-shadow: 0 0 0 3px var(--warning-bg); }
.dot-bad { background: var(--danger); box-shadow: 0 0 0 3px var(--danger-bg); }

/* Schedule Tab */
.schedule-section { padding: 0 20px 20px; }
.schedule-month {
  font-size: 15px; font-weight: 800; padding: 18px 4px 12px;
  display: flex; align-items: center; gap: 8px; letter-spacing: -0.3px;
}
.schedule-item {
  display: flex; gap: 14px;
  background: var(--surface); border-radius: var(--radius-sm);
  padding: 15px 17px;
  box-shadow: var(--shadow-sm); margin-bottom: 9px;
}
.sched-date {
  width: 46px; text-align: center; flex-shrink: 0;
  background: var(--bg); border-radius: var(--radius-xs);
  padding: 7px 0 6px;
}
.sched-day { font-size: 19px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
.sched-dow { font-size: 10px; color: var(--text-muted); font-weight: 700; }
.sched-info { flex: 1; }
.sched-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; letter-spacing: -0.2px; }
.sched-desc { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
.sched-type {
  font-size: 10px; font-weight: 700; padding: 3px 9px;
  border-radius: 6px; display: inline-block; margin-top: 6px;
}
.type-inspect { background: var(--info-bg); color: var(--info); }
.type-replace { background: var(--warning-bg); color: var(--warning); }
.type-check { background: var(--success-bg); color: var(--success); }

/* History */
.history-title { font-size: 15px; font-weight: 800; padding: 22px 24px 12px; letter-spacing: -0.3px; }
.history-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 24px; border-bottom: 1px solid var(--border-light);
}
.history-dot { width: 7px; height: 7px; border-radius: 50%; background: #C5CCD3; flex-shrink: 0; }
.history-text { font-size: 13px; flex: 1; font-weight: 500; }
.history-date { font-size: 11px; color: var(--text-muted); flex-shrink: 0; font-weight: 500; }

.section-empty { text-align: center; padding: 44px 20px; color: var(--text-muted); font-size: 14px; font-weight: 500; }

/* Asset Action Buttons */
.asset-actions {
  display: flex; gap: 8px; padding: 18px 20px 10px;
}
.asset-actions .action-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 13px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 800; text-decoration: none;
  box-shadow: var(--shadow-sm); cursor: pointer; border: none;
  font-family: inherit; transition: all var(--transition);
  letter-spacing: -0.2px;
}
.asset-actions .action-btn:active { transform: scale(0.97); }
.action-btn.add { background: var(--surface); color: var(--primary); border: 1.5px solid var(--primary); }
.action-btn.excel { background: var(--surface); color: #217346; border: 1.5px solid #217346; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(13,18,26,0.55);
  z-index: 200; display: none; align-items: flex-end; justify-content: center;
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface); border-radius: 24px 24px 0 0;
  width: 100%; max-width: 430px; max-height: 90vh;
  overflow-y: auto; padding: 26px 22px calc(26px + env(safe-area-inset-bottom, 0px));
  animation: slideUp 0.32s cubic-bezier(0.3, 1, 0.4, 1);
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 22px;
}
.modal-header h2 { font-size: 19px; font-weight: 800; letter-spacing: -0.4px; }
.modal-close {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--bg); border: none;
  font-size: 17px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; color: var(--text-secondary);
  transition: all var(--transition);
}
.modal-close:active { transform: scale(0.92); }
.form-group { margin-bottom: 15px; }
.form-group label {
  display: block; font-size: 12px; font-weight: 700;
  color: var(--text-secondary); margin-bottom: 7px;
}
.form-group label .required { color: var(--danger); }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 13px 15px; border-radius: 10px;
  border: 1.5px solid var(--border); font-size: 14px;
  font-family: inherit; background: var(--bg);
  transition: all var(--transition);
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: var(--primary); background: white;
}
.form-group textarea { resize: vertical; min-height: 64px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-submit {
  width: 100%; padding: 16px; border: none; border-radius: var(--radius-sm);
  background: var(--grad);
  color: white; font-size: 15px; font-weight: 800;
  cursor: pointer; font-family: inherit; margin-top: 10px;
  transition: all var(--transition);
  box-shadow: 0 6px 16px rgba(0,168,107,0.22);
}
.form-submit:active { transform: scale(0.98); }

/* Excel Upload Area */
.excel-upload-area {
  border: 2px dashed var(--border); border-radius: var(--radius-sm);
  padding: 32px 20px; text-align: center; cursor: pointer;
  transition: all var(--transition); margin-bottom: 16px;
  background: var(--bg);
}
.excel-upload-area:hover, .excel-upload-area.dragover {
  border-color: #217346; background: #F0FDF4;
}
.excel-upload-area .upload-icon { font-size: 36px; margin-bottom: 8px; }
.excel-upload-area .upload-text { font-size: 14px; font-weight: 700; color: var(--text-secondary); }
.excel-upload-area .upload-hint { font-size: 11px; color: var(--text-muted); margin-top: 5px; font-weight: 500; }
.excel-preview { margin: 16px 0; }
.excel-preview table {
  width: 100%; border-collapse: collapse; font-size: 11px;
}
.excel-preview th {
  background: var(--primary-light); color: var(--primary);
  padding: 8px 6px; font-weight: 700; text-align: left;
  border: 1px solid var(--border);
}
.excel-preview td {
  padding: 6px; border: 1px solid var(--border); color: var(--text-secondary);
}
.excel-preview tr:nth-child(even) td { background: var(--border-light); }
.template-download {
  display: inline-flex; align-items: center; gap: 6px;
  color: #217346; font-size: 13px; font-weight: 700;
  cursor: pointer; text-decoration: underline;
  margin-bottom: 16px;
}
.excel-count {
  font-size: 14px; font-weight: 800; color: var(--success);
  padding: 13px; background: var(--success-bg);
  border-radius: 10px; margin-bottom: 12px; text-align: center;
}

/* Bottom Nav */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: rgba(255,255,255,0.92); backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border-light);
  display: flex; justify-content: space-around;
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom, 0px));
  z-index: 100;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  text-decoration: none; color: #B0B8C1;
  font-size: 10px; font-weight: 700;
  padding: 6px 16px;
  min-height: 44px; min-width: 64px;
  justify-content: center;
}
.nav-item.active { color: var(--primary); }
.nav-item svg { width: 24px; height: 24px; }

/* Toast */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
  background: var(--navy); color: white;
  padding: 12px 22px; border-radius: 24px;
  font-size: 13px; font-weight: 700;
  z-index: 300; transition: transform 0.3s cubic-bezier(0.3, 1.2, 0.4, 1);
  box-shadow: 0 8px 20px rgba(23,36,74,0.3);
}
.toast.show { transform: translateX(-50%) translateY(0); }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-in { animation: fadeInUp 0.3s cubic-bezier(0.2, 0.8, 0.3, 1) both; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>관리자</h1>
  <span class="admin-badge">ADMIN</span>
</div>

<div class="tabs" id="tabs"></div>

<!-- 개별 등록 모달 -->
<div class="modal-overlay" id="addModal">

    <div class="modal-header">
      <h2>➕ 자산 등록</h2>
      <button class="modal-close" onclick="closeModal('addModal')">✕</button>
    </div>
    <form onsubmit="submitAsset(event)">
      <div class="form-group">
        <label>자산명 <span class="required">*</span></label>
        <input type="text" id="f_name" placeholder="예: 전자동 커피머신A" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>모델명</label>
          <input type="text" id="f_model" placeholder="예: Jura GIGA X8c">
        </div>
        <div class="form-group">
          <label>카테고리 <span class="required">*</span></label>
          <select id="f_category" required>
            <option value="">선택</option>
            <option value="시설">시설</option>
            <option value="환경">환경</option>
            <option value="IT장비">IT장비</option>
            <option value="비품">비품</option>
            <option value="청소">청소</option>
            <option value="주차">주차</option>
            <option value="기타">기타</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>위치 <span class="required">*</span></label>
        <input type="text" id="f_location" placeholder="예: 37층 타운홀" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>설치일</label>
          <input type="month" id="f_installed">
        </div>
        <div class="form-group">
          <label>관리번호</label>
          <input type="text" id="f_assetId" placeholder="자동생성">
        </div>
      </div>
      <div class="form-group">
        <label>담당자</label>
        <input type="text" id="f_manager" placeholder="예: 홍길동">
      </div>
      <div class="form-group">
        <label>메모</label>
        <textarea id="f_memo" placeholder="특이사항 기입"></textarea>
      </div>
      <button type="submit" class="form-submit">등록하기</button>
    </form>
  </div>
</div>

<!-- 엑셀 업로드 모달 -->
<div class="modal-overlay" id="excelModal">
  <div class="modal">
    <div class="modal-header">
      <h2>📊 엑셀 일괄 등록</h2>
      <button class="modal-close" onclick="closeModal('excelModal')">✕</button>
    </div>
    <div class="template-download" onclick="downloadTemplate()">📥 샘플 템플릿 다운로드 (.xlsx)</div>
    <div class="excel-upload-area" id="dropZone" onclick="document.getElementById('excelFile').click()">
      <div class="upload-icon">📂</div>
      <div class="upload-text">.xlsx 파일을 여기에 끌어다 놓거나 클릭하세요</div>
      <div class="upload-hint">컬럼: 자산명, 모델명, 위치, 카테고리, 설치일, 관리번호, 담당자, 메모</div>
    </div>
    <input type="file" id="excelFile" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleExcelFile(this)">
    <div id="excelPreview"></div>
    <button class="form-submit" id="excelSubmitBtn" style="display:none" onclick="submitExcelAssets()">일괄 등록하기</button>

</div>

<script type="module">
import { listReports, listAssets, updateReportStatus, createAsset, bulkCreateAssets } from './lib/supabase.js';

let activeTab = 'reports';
let pendingExcelAssets = [];
const TAB_LIST = [
  { key:'reports', label:'접수현황' },
  { key:'assets', label:'자산관리' },
  { key:'schedule', label:'점검일정' },
];

const SCHEDULE_DATA = [
  { date:'2026-03-27', dow:'목', title:'B동 3층 프로젝터 정기점검', desc:'Epson EB-2265U 필터 청소 + 램프 확인', type:'inspect' },
  { date:'2026-03-28', dow:'금', title:'주차장 게이트 점검', desc:'ParkPlus G300 센서 테스트', type:'check' },
  { date:'2026-04-02', dow:'수', title:'B동 4층 복합기 토너 교체', desc:'HP LaserJet M634 토너 + 드럼 교체', type:'replace' },
  { date:'2026-04-07', dow:'월', title:'엘리베이터 정기 안전검사', desc:'A동/B동 전체 승강기 법정 검사', type:'inspect' },
  { date:'2026-04-15', dow:'화', title:'소방 설비 점검', desc:'전 구역 소화기/스프링클러 점검', type:'inspect' },
];

const HISTORY_DATA = [
  { text:'B동 3층 프로젝터 램프 교체', date:'2026-03-10' },
  { text:'A동 2층 화장실 수도꼭지 교체', date:'2026-03-21' },
  { text:'B동 4층 복합기 용지함 수리', date:'2026-02-28' },
  { text:'주차장 1층 게이트 센서 교체', date:'2026-02-15' },
  { text:'A동 5층 탕비실 정수기 필터 교체', date:'2026-01-20' },
];

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

async function render() {
  document.getElementById('tabs').innerHTML = TAB_LIST.map(t =>
    `<div class="tab ${activeTab === t.key ? 'active' : ''}" data-tab="${t.key}">${t.label}</div>`
  ).join('');
  document.querySelectorAll('#tabs .tab').forEach(el => {
    el.addEventListener('click', () => { activeTab = el.dataset.tab; render(); });
  });

  try {
    if (activeTab === 'reports') await renderReports();
    else if (activeTab === 'assets') await renderAssets();
    else if (activeTab === 'schedule') renderSchedule();
  } catch (err) {
    console.error(err);
    document.getElementById('content').innerHTML = `<div class="section-empty">⚠️ 데이터 로드 실패: ${escapeHtml(err.message)}</div>`;
  }
}

async function renderReports() {
  const reports = await listReports();
  const counts = { '접수': 0, '처리중': 0, '완료': 0 };
  reports.forEach(r => { if (counts[r.status] !== undefined) counts[r.status]++; });

  document.getElementById('content').innerHTML = `
    <div class="dash-stats">
      <div class="dash-stat pending"><div class="val">${counts['접수']}</div><div class="lbl">접수</div></div>
      <div class="dash-stat progress"><div class="val">${counts['처리중']}</div><div class="lbl">처리중</div></div>
      <div class="dash-stat done"><div class="val">${counts['완료']}</div><div class="lbl">완료</div></div>
    </div>
    <div class="admin-list">
      ${reports.map((r, i) => `
        <div class="admin-card animate-in" style="animation-delay:${i * 0.03}s">
          <div class="admin-card-top">
            <div class="admin-title">${escapeHtml(r.title)}</div>
            <div class="admin-id">${escapeHtml(r.id)}</div>
          </div>
          <div class="admin-meta">
            <span>${escapeHtml(r.category)}</span>
            <span>📍 ${escapeHtml(r.location)}</span>
            <span>${escapeHtml(r.date)}</span>
            ${r.anonymous ? '<span style="color:var(--g-blue);font-weight:700">익명</span>' : ''}
          </div>
          <select class="status-select" data-report-id="${escapeHtml(r.id)}">
            <option value="접수" ${r.status==='접수'?'selected':''}>접수</option>
            <option value="처리중" ${r.status==='처리중'?'selected':''}>처리중</option>
            <option value="완료" ${r.status==='완료'?'selected':''}>완료</option>
          </select>
        </div>
      `).join('')}
      ${reports.length === 0 ? '<div class="section-empty">신고 내역이 없습니다</div>' : ''}
    </div>`;
  document.querySelectorAll('.status-select').forEach(sel => {
    sel.addEventListener('change', () => changeStatus(sel.dataset.reportId, sel.value));
  });
}

async function changeStatus(id, newStatus) {
  try {
    await updateReportStatus(id, newStatus);
    showToast(`${id} → ${newStatus}`);
    render();
  } catch (err) {
    showToast('⚠️ 상태 변경 실패: ' + err.message);
  }
}

async function renderAssets() {
  const assets = await listAssets();
  document.getElementById('content').innerHTML = `
    <div class="asset-actions">
      <button class="action-btn add" data-modal="addModal">➕ 등록</button>
      <button class="action-btn excel" data-modal="excelModal">📊 엑셀</button>
    </div>
    <div class="asset-list" style="padding-top:8px;">
      ${assets.map((a, i) => {
        const dotClass = (a.reports||0) >= 4 ? 'dot-bad' : (a.reports||0) >= 2 ? 'dot-warn' : 'dot-good';
        const detail = [a.model, a.location, a.installed ? '설치 '+a.installed : '', a.manager].filter(Boolean).join(' · ')
          + (a.reports ? ' · 신고 '+a.reports+'건' : '');
        return `
          <div class="asset-card animate-in" style="animation-delay:${i * 0.04}s">
            <div class="asset-emoji">${escapeHtml(a.emoji || '📦')}</div>
            <div class="asset-info">
              <div class="asset-name">${escapeHtml(a.name)}</div>
              <div class="asset-detail">${escapeHtml(detail)}</div>
            </div>
            <div class="asset-status-dot ${dotClass}" title="${a.reports||0}건 신고"></div>
          </div>`;
      }).join('')}
      ${assets.length === 0 ? '<div class="section-empty">등록된 자산이 없습니다</div>' : ''}
    </div>`;
  document.querySelectorAll('[data-modal]').forEach(btn => {
    btn.addEventListener('click', () => openModal(btn.dataset.modal));
  });
}

function renderSchedule() {
  const grouped = {};
  SCHEDULE_DATA.forEach(s => {
    const month = s.date.substring(0, 7);
    if (!grouped[month]) grouped[month] = [];
    grouped[month].push(s);
  });

  const typeLabels = { inspect:'정기점검', replace:'교체', check:'안전검사' };

  let html = '<div class="schedule-section" style="padding-top:4px;">';
  for (const [month, items] of Object.entries(grouped)) {
    const [y, m] = month.split('-');
    html += `<div class="schedule-month">📅 ${y}년 ${parseInt(m)}월</div>`;
    items.forEach((s, i) => {
      const day = parseInt(s.date.split('-')[2]);
      html += `
        <div class="schedule-item animate-in" style="animation-delay:${i * 0.04}s">
          <div class="sched-date">
            <div class="sched-day">${day}</div>
            <div class="sched-dow">${s.dow}</div>
          </div>
          <div class="sched-info">
            <div class="sched-title">${escapeHtml(s.title)}</div>
            <div class="sched-desc">${escapeHtml(s.desc)}</div>
            <span class="sched-type type-${s.type}">${typeLabels[s.type] || s.type}</span>
          </div>
        </div>`;
    });
  }
  html += '</div>';

  html += '<div class="history-title">최근 교체 이력</div>';
  HISTORY_DATA.forEach(h => {
    html += `
      <div class="history-item">
        <div class="history-dot"></div>
        <div class="history-text">${escapeHtml(h.text)}</div>
        <div class="history-date">${escapeHtml(h.date)}</div>
      </div>`;
  });

  document.getElementById('content').innerHTML = html;
}

// ─── Modal ───
function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) {
  document.getElementById(id).classList.remove('show');
  if (id === 'excelModal') { pendingExcelAssets = []; document.getElementById('excelPreview').innerHTML = ''; document.getElementById('excelSubmitBtn').style.display = 'none'; }
}
window.closeModal = closeModal; // 모달 X 버튼 inline onclick 호환

// ─── Category → Emoji mapping ───
const CATEGORY_EMOJI = {
  '시설':'🏢', '환경':'🌡️', 'IT장비':'💻', '비품':'☕',
  '청소':'🧹', '주차':'🅿️', '기타':'📦'
};

// ─── Individual Registration ───
async function submitAsset(e) {
  e.preventDefault();
  const category = document.getElementById('f_category').value;
  const payload = {
    id: document.getElementById('f_assetId').value.trim() || undefined, // 비우면 DB가 채번
    name: document.getElementById('f_name').value.trim(),
    model: document.getElementById('f_model').value.trim(),
    location: document.getElementById('f_location').value.trim(),
    category,
    installed: document.getElementById('f_installed').value.replace('-', '.'),
    manager: document.getElementById('f_manager').value.trim(),
    memo: document.getElementById('f_memo').value.trim(),
    emoji: CATEGORY_EMOJI[category] || '📦',
    reports: 0,
  };
  try {
    const created = await createAsset(payload);
    closeModal('addModal');
    e.target.reset();
    showToast(`✅ "${created.name}" 등록 완료`);
    render();
  } catch (err) {
    showToast('⚠️ 등록 실패: ' + err.message);
  }
}

// ─── Excel Upload ───
function handleExcelFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws);
      if (rows.length === 0) { showToast('⚠️ 데이터가 없습니다'); return; }
      pendingExcelAssets = rows.map(r => ({
        id: r['관리번호'] || '',
        name: r['자산명'] || '',
        model: r['모델명'] || '',
        location: r['위치'] || '',
        category: r['카테고리'] || '기타',
        installed: String(r['설치일'] || '').replace('-', '.'),
        manager: r['담당자'] || '',
        memo: r['메모'] || '',
        emoji: CATEGORY_EMOJI[r['카테고리']] || '📦',
        reports: 0,
      }));
      renderExcelPreview();
    } catch(err) { showToast('⚠️ 파일 읽기 실패: ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
  input.value = '';
}

function renderExcelPreview() {
  const cols = ['자산명','모델명','위치','카테고리','설치일','관리번호','담당자','메모'];
  let html = `<div class="excel-count">📋 ${pendingExcelAssets.length}건 감지됨</div>`;
  html += '<div class="excel-preview"><table><tr>' + cols.map(c => `<th>${escapeHtml(c)}</th>`).join('') + '</tr>';
  pendingExcelAssets.slice(0, 10).forEach(a => {
    html += '<tr>' + [a.name, a.model, a.location, a.category, a.installed, a.id, a.manager, a.memo].map(v => `<td>${escapeHtml(v||'')}</td>`).join('') + '</tr>';
  });
  if (pendingExcelAssets.length > 10) html += `<tr><td colspan="${cols.length}" style="text-align:center;color:var(--text-muted)">... 외 ${pendingExcelAssets.length - 10}건</td></tr>`;
  html += '</table></div>';
  document.getElementById('excelPreview').innerHTML = html;
  document.getElementById('excelSubmitBtn').style.display = 'block';
}

async function submitExcelAssets() {
  if (pendingExcelAssets.length === 0) return;
  try {
    const created = await bulkCreateAssets(pendingExcelAssets);
    showToast(`✅ ${created.length}건 일괄 등록 완료`);
    closeModal('excelModal');
    render();
  } catch (err) {
    showToast('⚠️ 일괄 등록 실패: ' + err.message);
  }
}

// ─── Excel Template Download ───
function downloadTemplate() {
  const template = [
    { '자산명':'전자동 커피머신B', '모델명':'Jura GIGA X8c', '위치':'38층 라운지', '카테고리':'비품', '설치일':'2025.06', '관리번호':'', '담당자':'김총무', '메모':'2층 이전 예정' },
    { '자산명':'42층 남자 화장실', '모델명':'', '위치':'42층', '카테고리':'시설', '설치일':'', '관리번호':'', '담당자':'', '메모':'' },
  ];
  const ws = XLSX.utils.json_to_sheet(template);
  ws['!cols'] = [{ wch:20 },{ wch:18 },{ wch:15 },{ wch:10 },{ wch:10 },{ wch:12 },{ wch:10 },{ wch:20 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '자산목록');
  XLSX.writeFile(wb, '자산등록_템플릿.xlsx');
}

// ─── Wire up form/buttons (module scope — no inline handlers) ───
document.querySelector('#addModal form').addEventListener('submit', submitAsset);
document.getElementById('excelSubmitBtn').addEventListener('click', submitExcelAssets);
document.querySelector('.template-download').addEventListener('click', downloadTemplate);
document.getElementById('dropZone').addEventListener('click', () => document.getElementById('excelFile').click());
document.getElementById('excelFile').addEventListener('change', e => handleExcelFile(e.target));

// ─── Drag & Drop ───
const dz = document.getElementById('dropZone');
if (dz) {
  ['dragenter','dragover'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('dragover'); }));
  ['dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove('dragover'); }));
  dz.addEventListener('drop', e => {
    const file = e.dataTransfer.files[0];
    if (file) { const dt = new DataTransfer(); dt.items.add(file); document.getElementById('excelFile').files = dt.files; handleExcelFile(document.getElementById('excelFile')); }
  });
}

render();
</script>
